name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python smoke dependencies
        run: python -m pip install --upgrade pyTelegramBotAPI requests pysocks

      - name: Python compile
        run: python -m compileall -q .

      - name: Python smoke
        run: python tests/smoke_modules.py

      - name: Secret scan
        run: python tests/secret_scan.py

      - name: Shell syntax
        run: |
          bash -n \
            script.sh \
            bootstrap/install.sh \
            app/update_fork.sh \
            app/unblock_update.sh \
            app/unblock_ipset.sh \
            app/100-ipset.sh \
            app/100-redirect.sh \
            app/S99telegram_bot \
            app/S98telegram_bot_installer \
            app/S99unblock

      - name: JavaScript syntax
        run: npm run ui:check

      - name: Install UI smoke dependencies
        run: |
          npm install
          npm run ui:install-browsers

      - name: UI smoke
        run: |
          python -u tests/ui_fixture_server.py --host 127.0.0.1 --port 18765 > /tmp/ui-fixture.log 2>&1 &
          fixture_pid=$!
          trap 'kill "$fixture_pid" || true; cat /tmp/ui-fixture.log' EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18765/ > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18765/ > /dev/null
          BYPASS_UI_URL=http://127.0.0.1:18765/ npm run ui:smoke
